aid: tavily
name: Tavily
description: >-
  Tavily is a web access API platform optimized for LLMs and AI agents. It
  exposes a unified REST surface for real-time web search, page content
  extraction, site crawling, sitemap mapping, and AI-driven research tasks.
  The platform emphasizes low-latency search with a 180ms p50 on the search
  endpoint, a 99.99% uptime SLA, and built-in content validation safeguards.
  Tavily ships Python and JavaScript SDKs and integrates cleanly with major
  agent frameworks and LLM providers such as OpenAI, Anthropic, and Groq.
  Used by more than a million developers, it is trusted by enterprise
  customers including Databricks, IBM, JetBrains, MongoDB, and AWS.
