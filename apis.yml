apis:
  - aid: tavily:web-api
    name: Tavily Web API
    description: >-
      The Tavily Web API offers a unified set of endpoints for AI agents to
      search the web, extract page content, crawl sites, map sitemaps, and run
      AI research tasks. Endpoints are REST-based and authenticated with a
      bearer API key.
    humanURL: https://docs.tavily.com
    baseURL: https://api.tavily.com
    tags:
      - Search
      - Extract
      - Crawl
      - Map
      - Research
      - REST
    properties:
      - type: Documentation
        url: https://docs.tavily.com
      - type: GettingStarted
        url: https://docs.tavily.com/welcome
      - type: SignUp
        url: https://app.tavily.com/home
